<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Learning Roadmap — PyLearn</title>
  <meta name="description" content="Your complete Python learning path — 12 stages from First Steps to OOP and Real-World Projects. Track your progress and unlock new stages."/>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/navbar.css"/>
  <style>
    .roadmap-hero {
      text-align: center;
      padding: var(--sp-12) 0 var(--sp-8);
    }
    .roadmap-hero h1 { margin-bottom: var(--sp-3); }
    .roadmap-hero p  { font-size: 1.1rem; max-width: 560px; margin: 0 auto; }

    /* ── Winding Path ──── */
    .roadmap-container {
      max-width: 820px;
      margin: 0 auto;
      padding: var(--sp-8) var(--sp-8) var(--sp-16);
      position: relative;
    }

    /* Vertical spine */
    .roadmap-spine {
      position: absolute;
      left: 50%;
      top: 0; bottom: 0;
      width: 4px;
      transform: translateX(-50%);
      background: linear-gradient(to bottom, var(--orange), var(--yellow), var(--mint));
      border-radius: var(--r-full);
    }

    .stage-row {
      display: flex;
      align-items: center;
      gap: var(--sp-6);
      margin-bottom: var(--sp-5);
      position: relative;
    }
    /* Alternate sides */
    .stage-row.right { flex-direction: row-reverse; }
    .stage-row.right .stage-card { text-align: right; }
    .stage-row.right .stage-tags { justify-content: flex-end; }
    .stage-row.right .stage-status { justify-content: flex-end; }

    /* Node circle */
    .stage-node {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: var(--surface);
      border: 4px solid var(--orange);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-size: 1.6rem;
      flex-shrink: 0;
      z-index: 2;
      box-shadow: var(--shadow-card);
      transition: all var(--ease-bounce);
      cursor: pointer;
      position: relative;
    }
    .stage-node:hover { transform: scale(1.12); box-shadow: var(--shadow); }
    .stage-node.completed { border-color: var(--mint); background: rgba(46,196,182,0.08); }
    .stage-node.locked    { border-color: var(--border-strong); filter: grayscale(0.7); opacity: 0.7; }
    .stage-node-num {
      font-size: 0.58rem;
      font-weight: 800;
      color: var(--orange);
      margin-top: -2px;
      letter-spacing: 0.03em;
    }
    .stage-node.completed .stage-node-num { color: var(--mint); }
    .stage-node.locked    .stage-node-num { color: var(--text-muted); }

    /* Card */
    .stage-card {
      flex: 1;
      background: var(--surface);
      border-radius: var(--r-lg);
      padding: var(--sp-5) var(--sp-6);
      border: 1.5px solid var(--border);
      box-shadow: var(--shadow-card);
      transition: all var(--ease);
      cursor: pointer;
      text-decoration: none;
      display: block;
    }
    .stage-card:hover { border-color: var(--orange); box-shadow: var(--shadow); transform: translateY(-3px); }
    .stage-card.completed { border-color: var(--mint); }
    .stage-card.locked    { opacity: 0.6; cursor: not-allowed; }
    .stage-card.locked:hover { transform: none; border-color: var(--border); box-shadow: var(--shadow-card); }

    .stage-name     { font-family: var(--font-heading); font-size: 1.2rem; color: var(--text); margin-bottom: var(--sp-1); }
    .stage-subtitle { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: var(--sp-3); line-height: 1.5; }
    .stage-tags     { display: flex; flex-wrap: wrap; gap: var(--sp-2); margin-bottom: var(--sp-3); }
    .stage-status   { display: flex; align-items: center; gap: var(--sp-3); }

    .stage-progress-wrap { flex: 1; max-width: 160px; }

    /* Connector line (horizontal) */
    .stage-connector {
      position: absolute;
      top: 50%;
      width: 40px;
      height: 3px;
      background: var(--orange);
      border-radius: var(--r-full);
      transform: translateY(-50%);
      z-index: 1;
    }
    .stage-row .stage-connector    { left: calc(50% - 40px); }
    .stage-row.right .stage-connector { right: calc(50% - 40px); left: auto; }

    /* Completion check */
    .check-badge {
      width: 24px; height: 24px;
      background: var(--mint);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem;
      color: white;
      flex-shrink: 0;
    }

    /* Overall progress bar at top */
    .overall-progress-card {
      background: var(--surface);
      border-radius: var(--r-lg);
      padding: var(--sp-6) var(--sp-8);
      border: 1.5px solid var(--border);
      margin-bottom: var(--sp-10);
      display: flex;
      align-items: center;
      gap: var(--sp-8);
      flex-wrap: wrap;
    }
    .op-stat { text-align: center; }
    .op-stat-num { font-family: var(--font-heading); font-size: 2.2rem; color: var(--orange); }
    .op-stat-label { font-size: 0.78rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .op-bar-wrap { flex: 1; min-width: 200px; }
    .op-bar-label { display: flex; justify-content: space-between; font-size: 0.82rem; font-weight: 700; color: var(--text-secondary); margin-bottom: var(--sp-2); }

    @media (max-width: 640px) {
      .roadmap-spine { display: none; }
      .stage-row, .stage-row.right { flex-direction: column; text-align: left; }
      .stage-connector { display: none; }
      .stage-row.right .stage-tags, .stage-row.right .stage-status { justify-content: flex-start; }
      .stage-row.right .stage-card { text-align: left; }
      .stage-node { align-self: flex-start; }
    }
  </style>
  <script src="js/speed-insights.js" defer></script>
</head>
<body>
<div class="main-content hero-bg">

  <div class="container">
    <!-- Hero -->
    <div class="roadmap-hero observe">
      <div class="pill pill-orange" style="margin-bottom:var(--sp-4)">🗺️ Your Learning Path</div>
      <h1>The Python Roadmap</h1>
      <p>12 stages. From "What even is code?" to building real projects. You can do this. Sarpanch believes in you.</p>
    </div>

    <!-- Overall Progress -->
    <div class="overall-progress-card observe" id="progress-card">
      <div class="op-stat">
        <div class="op-stat-num" id="stages-done">0</div>
        <div class="op-stat-label">Stages Done</div>
      </div>
      <div class="op-stat">
        <div class="op-stat-num" id="total-xp-rm">0</div>
        <div class="op-stat-label">XP Earned</div>
      </div>
      <div class="op-stat">
        <div class="op-stat-num" id="streak-rm">0</div>
        <div class="op-stat-label">Day Streak 🔥</div>
      </div>
      <div class="op-bar-wrap">
        <div class="op-bar-label">
          <span>Overall Progress</span>
          <span id="pct-label">0%</span>
        </div>
        <div class="xp-bar" style="height:12px">
          <div class="xp-bar-fill" id="overall-bar" style="width:0%"></div>
        </div>
      </div>
    </div>

    <!-- Roadmap -->
    <div class="roadmap-container">
      <div class="roadmap-spine"></div>
      <div id="roadmap-stages">
        <!-- Injected by JS -->
      </div>
    </div>
  </div>

</div>
<script src="js/app.js"></script>
<script src="js/roadmap.js"></script>
<script>
  renderNavbar('roadmap.html');
  renderFooter();
  initRoadmap();
</script>
</body>
</html>
