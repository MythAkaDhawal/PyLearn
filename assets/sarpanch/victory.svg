<svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
  <!-- Shadow -->
  <ellipse cx="100" cy="230" rx="55" ry="10" fill="rgba(26,26,46,0.10)"/>
  <!-- Body -->
  <ellipse cx="100" cy="165" rx="50" ry="55" fill="#3DCB7A"/>
  <ellipse cx="100" cy="165" rx="32" ry="38" fill="#6EE6A0" opacity="0.7"/>
  <ellipse cx="100" cy="118" rx="30" ry="17" fill="#3DCB7A"/>
  <!-- Head -->
  <circle cx="100" cy="88" r="48" fill="#4DDA88"/>
  <!-- Eyes - confident/cool sunglasses -->
  <rect x="58" y="72" width="28" height="18" rx="9" fill="#1A1A2E"/>
  <rect x="92" y="72" width="28" height="18" rx="9" fill="#1A1A2E"/>
  <line x1="86" y1="80" x2="92" y2="80" stroke="#1A1A2E" stroke-width="2.5"/>
  <!-- Sunglasses shine -->
  <ellipse cx="68" cy="78" rx="5" ry="3" fill="rgba(255,255,255,0.25)"/>
  <ellipse cx="102" cy="78" rx="5" ry="3" fill="rgba(255,255,255,0.25)"/>
  <!-- Big confident grin -->
  <path d="M 72 104 Q 100 124 128 104" stroke="#1A1A2E" stroke-width="3.5" fill="rgba(255,107,53,0.15)" stroke-linecap="round"/>
  <rect x="86" y="107" width="10" height="9" rx="2" fill="white"/>
  <rect x="98" y="107" width="10" height="9" rx="2" fill="white"/>
  <!-- Trophy -->
  <rect x="138" y="134" width="36" height="30" rx="4" fill="#FFD166" stroke="#E5B84E" stroke-width="1.5"/>
  <rect x="148" y="162" width="16" height="8" rx="2" fill="#E5B84E"/>
  <rect x="144" y="169" width="24" height="4" rx="2" fill="#E5B84E"/>
  <path d="M 138 140 Q 126 140 126 154 Q 126 164 138 164" stroke="#FFD166" stroke-width="4" fill="none"/>
  <path d="M 174 140 Q 186 140 186 154 Q 186 164 174 164" stroke="#FFD166" stroke-width="4" fill="none"/>
  <text x="156" y="155" font-size="14" text-anchor="middle">🏆</text>
  <!-- Arm holding trophy -->
  <path d="M 148 150 Q 148 140 138 134" stroke="#3DCB7A" stroke-width="15" fill="none" stroke-linecap="round"/>
  <!-- Left arm on hip -->
  <path d="M 52 148 Q 32 168 40 188" stroke="#3DCB7A" stroke-width="14" fill="none" stroke-linecap="round"/>
  <!-- Blush (proud) -->
  <circle cx="70" cy="98" r="10" fill="#FF6B35" opacity="0.28"/>
  <circle cx="130" cy="98" r="10" fill="#FF6B35" opacity="0.28"/>
  <!-- Stars / confetti -->
  <text x="24" y="50" font-size="20">🎊</text>
  <text x="160" y="45" font-size="18">⭐</text>
  <text x="100" y="28" font-size="16" text-anchor="middle">🎉</text>
  <text x="40"  y="90" font-size="14">✨</text>
  <!-- Tail -->
  <path d="M 76 212 Q 56 230 78 236 Q 98 240 94 220" fill="#3DCB7A"/>
  <!-- Cape (hero) -->
  <path d="M 52 118 Q 20 155 26 190 Q 52 168 100 175 Q 148 168 174 190 Q 180 155 148 118" fill="#FF6B35" opacity="0.75"/>
